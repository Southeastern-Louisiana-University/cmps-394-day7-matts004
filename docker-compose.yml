version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: labdb
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://labuser:labpassword@db:3306/labdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  ui:
    build: ./ui
    ports:
      - "80:80"
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge